<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>PSN App</title>
    <link rel="stylesheet" href="./renderer/styles.css" />
  </head>
  <body>
    <div id="app">
      <nav id="sidebar">
        <div class="sidebar-top">
          <div class="app-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path d="M21.58 16.09l-1.09-7.66C20.21 6.46 18.52 5 16.53 5H7.47C5.48 5 3.79 6.46 3.51 8.43l-1.09 7.66C2.2 17.63 3.39 19 4.94 19h0c.68 0 1.32-.3 1.76-.82L9 15h6l2.3 3.18c.44.52 1.08.82 1.76.82h0c1.55 0 2.74-1.37 2.52-2.91z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="9.5" cy="10.5" r="1" fill="currentColor"/>
              <circle cx="14.5" cy="10.5" r="1" fill="currentColor"/>
            </svg>
            <span>PSN App</span>
          </div>

          <div class="nav-items">
            <button class="nav-item active" data-view="dashboard">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <span>Dashboard</span>
            </button>
            <button class="nav-item" data-view="friends">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
              <span>Amis</span>
            </button>
            <button class="nav-item" data-view="trophies">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4.5a2.5 2.5 0 010-5H6"/><path d="M18 9h1.5a2.5 2.5 0 000-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22"/><path d="M18 2H6v7a6 6 0 0012 0V2z"/></svg>
              <span>Trophees</span>
            </button>
            <button class="nav-item" data-view="library">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              <span>Bibliotheque</span>
            </button>

            <div class="nav-separator"></div>

            <button class="nav-item" data-view="search">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <span>Recherche</span>
            </button>
          </div>
        </div>

        <div class="sidebar-bottom">
          <div id="sidebar-profile" class="sidebar-profile">
            <div class="sidebar-avatar-placeholder"></div>
            <span class="sidebar-username">Chargement...</span>
          </div>
        </div>
      </nav>

      <main id="content">
        <!-- Views rendered here -->
      </main>
    </div>

    <script type="module" src="./renderer/app.js"></script>
  </body>
</html>
